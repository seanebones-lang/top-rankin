<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3d2a"/>
      <stop offset="0.55" stop-color="#f3d34a"/>
      <stop offset="1" stop-color="#a21515"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="70%">
      <stop offset="0" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow)"/>

  <g opacity="0.25" filter="url(#soft)">
    <circle cx="280" cy="320" r="220" fill="#12b76a"/>
    <circle cx="1260" cy="260" r="260" fill="#f3d34a"/>
    <circle cx="980" cy="980" r="320" fill="#ef4444"/>
  </g>

  <g fill="rgba(255,255,255,0.78)">
    <text x="120" y="870" font-family="ui-sans-serif, system-ui" font-size="72" font-weight="700" letter-spacing="1">
      Top Rankin' Herb
    </text>
    <text x="120" y="940" font-family="ui-sans-serif, system-ui" font-size="32" opacity="0.92">
      Replace this placeholder with your product photo.
    </text>
  </g>
</svg>

